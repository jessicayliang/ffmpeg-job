<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Clipper</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #0c0c0e;
          --surface:  #141417;
          --border:   #242428;
          --border2:  #2e2e34;
          --text:     #e8e8ec;
          --muted:    #7a7a85;
          --accent:   #d4f06c;
          --accent2:  #a8c850;
          --danger:   #f06c6c;
          --mono:     'DM Mono', monospace;
          --sans:     'DM Sans', sans-serif;
          --radius:   10px;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          font-size: 14px;
          min-height: 100vh;
          line-height: 1.6;
        }

        /* ── header ── */
        header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 20px 32px;
          border-bottom: 1px solid var(--border);
          position: sticky;
          top: 0;
          background: var(--bg);
          z-index: 10;
        }
        .logo {
          font-family: var(--mono);
          font-size: 15px;
          font-weight: 500;
          letter-spacing: 0.04em;
          color: var(--accent);
        }
        .logo span { color: var(--muted); }
        #auth-btn {
          display: flex;
          align-items: center;
          gap: 8px;
          background: var(--surface);
          border: 1px solid var(--border2);
          color: var(--text);
          padding: 7px 14px;
          border-radius: var(--radius);
          font-family: var(--sans);
          font-size: 13px;
          cursor: pointer;
          transition: border-color .15s, background .15s;
        }
        #auth-btn:hover { border-color: var(--accent); background: #1a1a1e; }
        #auth-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .user-pill {
          display: flex;
          align-items: center;
          gap: 8px;
          font-size: 13px;
          color: var(--muted);
        }
        .user-pill img {
          width: 26px; height: 26px;
          border-radius: 50%;
          border: 1px solid var(--border2);
        }
        .sign-out {
          background: none;
          border: none;
          color: var(--muted);
          font-size: 12px;
          cursor: pointer;
          font-family: var(--sans);
          padding: 3px 6px;
          border-radius: 5px;
          transition: color .15s;
        }
        .sign-out:hover { color: var(--danger); }

        /* ── gate ── */
        #gate {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: calc(100vh - 65px);
          gap: 16px;
          text-align: center;
          padding: 32px;
        }
        #gate h1 {
          font-size: 28px;
          font-weight: 300;
          letter-spacing: -0.02em;
        }
        #gate h1 em { font-style: normal; color: var(--accent); }
        #gate p { color: var(--muted); max-width: 340px; font-size: 14px; }

        /* ── main app ── */
        #app { display: none; max-width: 820px; margin: 0 auto; padding: 36px 24px 80px; }

        /* ── video block ── */
        .video-block {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 14px;
          margin-bottom: 16px;
          overflow: hidden;
          transition: border-color .2s;
        }
        .video-block:focus-within { border-color: var(--border2); }

        .video-header {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 14px 16px 0;
        }
        .video-index {
          font-family: var(--mono);
          font-size: 11px;
          color: var(--muted);
          background: var(--border);
          padding: 2px 7px;
          border-radius: 5px;
          flex-shrink: 0;
        }
        .url-input {
          flex: 1;
          background: transparent;
          border: none;
          outline: none;
          color: var(--text);
          font-family: var(--mono);
          font-size: 12px;
          padding: 4px 0;
        }
        .url-input::placeholder { color: var(--muted); }
        .remove-video {
          background: none;
          border: none;
          color: var(--muted);
          cursor: pointer;
          padding: 4px;
          border-radius: 5px;
          line-height: 0;
          transition: color .15s;
          flex-shrink: 0;
        }
        .remove-video:hover { color: var(--danger); }

        /* ── clips table ── */
        .clips-area { padding: 12px 16px 16px; }
        .clips-label {
          font-size: 11px;
          color: var(--muted);
          letter-spacing: 0.06em;
          text-transform: uppercase;
          margin-bottom: 8px;
        }
        .clip-row {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr auto;
          gap: 8px;
          margin-bottom: 6px;
          align-items: center;
        }
        .clip-input {
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 7px;
          padding: 7px 10px;
          color: var(--text);
          font-family: var(--mono);
          font-size: 12px;
          outline: none;
          transition: border-color .15s;
          width: 100%;
        }
        .clip-input:focus { border-color: var(--accent); }
        .clip-input::placeholder { color: #444; }
        .clip-input.error { border-color: var(--danger); }
        .remove-clip {
          background: none;
          border: none;
          color: var(--border2);
          cursor: pointer;
          padding: 4px;
          border-radius: 5px;
          line-height: 0;
          transition: color .15s;
        }
        .remove-clip:hover { color: var(--danger); }
        .add-clip-btn {
          display: flex;
          align-items: center;
          gap: 6px;
          background: none;
          border: 1px dashed var(--border2);
          color: var(--muted);
          padding: 7px 12px;
          border-radius: 7px;
          cursor: pointer;
          font-family: var(--sans);
          font-size: 12px;
          margin-top: 4px;
          transition: border-color .15s, color .15s;
          width: 100%;
        }
        .add-clip-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── add video ── */
        #add-video-btn {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          width: 100%;
          padding: 13px;
          background: none;
          border: 1px dashed var(--border);
          border-radius: 14px;
          color: var(--muted);
          font-family: var(--sans);
          font-size: 13px;
          cursor: pointer;
          transition: border-color .15s, color .15s;
          margin-bottom: 24px;
        }
        #add-video-btn:hover { border-color: var(--accent); color: var(--accent); }
        #add-video-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── run button ── */
        #run-btn {
          width: 100%;
          padding: 14px;
          background: var(--accent);
          color: #0c0c0e;
          border: none;
          border-radius: var(--radius);
          font-family: var(--sans);
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: background .15s, opacity .15s;
          letter-spacing: 0.01em;
        }
        #run-btn:hover { background: var(--accent2); }
        #run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── status ── */
        #status {
          margin-top: 16px;
          padding: 12px 16px;
          border-radius: var(--radius);
          font-family: var(--mono);
          font-size: 12px;
          display: none;
        }
        #status.loading {
          display: flex;
          align-items: center;
          gap: 10px;
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--muted);
        }
        #status.success {
          display: block;
          background: #162212;
          border: 1px solid #2a4020;
          color: var(--accent);
        }
        #status.error {
          display: block;
          background: #1e1010;
          border: 1px solid #3e2020;
          color: var(--danger);
        }

        .spinner {
          width: 14px; height: 14px;
          border: 2px solid var(--border2);
          border-top-color: var(--accent);
          border-radius: 50%;
          animation: spin .7s linear infinite;
          flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── column headers ── */
        .clip-headers {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr auto;
          gap: 8px;
          margin-bottom: 4px;
        }
        .clip-headers span {
          font-size: 10px;
          color: var(--muted);
          letter-spacing: 0.06em;
          text-transform: uppercase;
          padding-left: 10px;
        }

        /* ── limit note ── */
        .limit-note {
          font-size: 11px;
          color: var(--muted);
          text-align: right;
          margin-top: 6px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">clip<span>/</span>per 🎀</div>
    <div id="auth-area">
        <button id="auth-btn">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
    </div>
</header>

<!-- gate: shown when not signed in -->
<div id="gate">
    <h1>Cut videos into <em>clips</em> 🎀</h1>
    <p>Sign in with your Google account to get started. Paste a Drive link, set your timestamps, and download a ZIP.</p>
</div>

<!-- app: shown when signed in -->
<div id="app">
    <div id="video-list"></div>

    <button id="add-video-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Add another video
    </button>

    <button id="run-btn">Run clips</button>
    <div id="status"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    const API_URL = window.location.origin;
    const CLIENT_ID = "417708570964-hlqfc4vqnn48vjnqvr0tqt8cvbdv7l9t.apps.googleusercontent.com";

    const MAX_VIDEOS = 5;
    const MAX_CLIPS = 20;

    let accessToken = null;
    let tokenClient = null;
    let videoCount = 0;


    // ── Google Auth ─────────────────────────────────────────────
    window.addEventListener("load", () => {
      const interval = setInterval(() => {
        if (typeof google === "undefined") return;
        clearInterval(interval);

        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: "openid email profile https://www.googleapis.com/auth/drive.readonly",
          callback: onTokenResponse,
        });
      }, 100);
    });

    function promptSignIn() {
      if (tokenClient) {
        tokenClient.requestAccessToken({ prompt: "select_account" });
      }
    }

    document.getElementById("auth-btn").addEventListener("click", promptSignIn);

    function onTokenResponse(response) {
      if (response.error) {
        setStatus("error", "Google sign-in failed: " + response.error);
        return;
      }

      accessToken = response.access_token;

      fetch("https://openidconnect.googleapis.com/v1/userinfo", {
        headers: { Authorization: "Bearer " + accessToken },
      })
        .then(r => r.json())
        .then(profile => showApp(profile))
        .catch(() => setStatus("error", "Could not fetch profile"));
    }

    function showApp(profile) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("auth-area").innerHTML = `
        <div class="user-pill">
          ${profile.picture ? `<img src="${profile.picture}" />` : ""}
          <span>${profile.email}</span>
          <button class="sign-out" onclick="signOut()">sign out</button>
        </div>
      `;

      if (document.getElementById("video-list").children.length === 0) {
        addVideo();
      }
    }

    function signOut() {
      if (accessToken) {
        google.accounts.oauth2.revoke(accessToken);
      }

      accessToken = null;

      document.getElementById("gate").style.display = "flex";
      document.getElementById("app").style.display = "none";

      document.getElementById("auth-area").innerHTML = `
        <button id="auth-btn">
          Sign in with Google
        </button>
      `;

      document.getElementById("auth-btn").addEventListener("click", promptSignIn);
    }

    // ── Video UI ────────────────────────────────────────────────
    function addVideo() {
      const list = document.getElementById("video-list");
      if (list.children.length >= MAX_VIDEOS) return;

      videoCount++;
      const id = videoCount;

      const block = document.createElement("div");
      block.className = "video-block";
      block.dataset.id = id;

      block.innerHTML = `
        <div class="video-header">
          <span class="video-index">video ${String(id).padStart(2, "0")}</span>
          <input class="url-input" placeholder="Drive URL" data-field="url"/>
          <button class="remove-video" onclick="removeVideo(${id})">✕</button>
        </div>

        <div class="clips-area">
          <div class="clip-headers">
            <span>start</span><span>end</span><span>label</span><span></span>
          </div>
          <div class="clip-rows"></div>
          <button class="add-clip-btn" onclick="addClip(${id})">+ Add clip</button>
          <div class="limit-note" id="clip-note-${id}"></div>
        </div>
      `;

      list.appendChild(block);
      addClip(id);
      updateAddVideoBtn();
    }

    function removeVideo(id) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.remove();
      updateAddVideoBtn();
    }

    function addClip(videoId) {
      const block = document.querySelector(`[data-id="${videoId}"]`);
      const rows = block.querySelector(".clip-rows");

      if (rows.children.length >= MAX_CLIPS) return;

      const row = document.createElement("div");
      row.className = "clip-row";

      row.innerHTML = `
        <input class="clip-input" placeholder="00:00:00" data-field="start"/>
        <input class="clip-input" placeholder="00:00:10" data-field="end"/>
        <input class="clip-input" placeholder="label" data-field="label"/>
        <button onclick="this.parentElement.remove()">✕</button>
      `;

      rows.appendChild(row);
    }

    function updateAddVideoBtn() {
      const btn = document.getElementById("add-video-btn");
      btn.disabled = document.getElementById("video-list").children.length >= MAX_VIDEOS;
    }

    document.getElementById("add-video-btn").addEventListener("click", addVideo);

    // ── Validation ─────────────────────────────────────────────
    const TS_RE = /^\d{1,2}:\d{2}(:\d{2})?(\.\d+)?$/;

    function validate() {
      let ok = true;

      document.querySelectorAll(".clip-input").forEach(i => i.classList.remove("error"));

      document.querySelectorAll(".video-block").forEach(block => {
        const url = block.querySelector("[data-field=url]").value.trim();
        if (!url) ok = false;

        block.querySelectorAll(".clip-row").forEach(row => {
          const start = row.querySelector("[data-field=start]");
          const end = row.querySelector("[data-field=end]");

          if (!TS_RE.test(start.value.trim())) {
            start.classList.add("error");
            ok = false;
          }
          if (!TS_RE.test(end.value.trim())) {
            end.classList.add("error");
            ok = false;
          }
        });
      });

      return ok;
    }

    // ── Run ────────────────────────────────────────────────────
    document.getElementById("run-btn").addEventListener("click", runClips);

    async function runClips() {
      if (!accessToken) return;

      if (!validate()) {
        setStatus("error", "Fix errors before running.");
        return;
      }

      const jobs = [];

      document.querySelectorAll(".video-block").forEach(block => {
        const url = block.querySelector("[data-field=url]").value.trim();
        const clips = [];

        block.querySelectorAll(".clip-row").forEach((row, i) => {
          clips.push({
            start: row.querySelector("[data-field=start]").value.trim(),
            end: row.querySelector("[data-field=end]").value.trim(),
            label: row.querySelector("[data-field=label]").value.trim() || `clip_${i+1}`
          });
        });

        jobs.push({ drive_url: url, clips });
      });

      document.getElementById("run-btn").disabled = true;

      try {
        for (let i = 0; i < jobs.length; i++) {
          const clipCount = jobs[i].clips.length;
          setStatus("loading", `Starting video ${i + 1} of ${jobs.length}…`);
          await downloadJob(jobs[i], i + 1, jobs.length);
        }
        setStatus("success", "Done! Check your downloads folder.");
      } catch (e) {
        setStatus("error", e.message);
      }

      document.getElementById("run-btn").disabled = false;
    }

    function formatStatus(raw, videoIndex, total) {
      if (raw.startsWith("downloading ")) return `Video ${videoIndex}/${total}: downloading ${raw.replace("downloading ", "")}`;
      if (raw.startsWith("clipping "))    return `Video ${videoIndex}/${total}: clipping ${raw.replace("clipping ", "")}`;
      if (raw.startsWith("uploading"))    return `Video ${videoIndex}/${total}: uploading to cloud…`;
      if (raw === "processing clips")     return `Video ${videoIndex}/${total}: processing…`;
      if (raw === "starting")             return `Video ${videoIndex}/${total}: starting…`;
      if (raw === "done")                 return `Video ${videoIndex}/${total}: done`;
      return `Video ${videoIndex}/${total}: ${raw}`;
    }

    async function downloadJob(job, index, total) {
      const startTime = Date.now();
      setStatus("loading", `Video ${index}/${total}: working…`, startTime);

      const res = await fetch(`${API_URL}/clip`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${accessToken}`,
        },
        body: JSON.stringify(job),
      });

      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try { const j = await res.json(); detail = j.detail || detail; } catch {}
        throw new Error(detail);
      }

      const { url, filename } = await res.json();
      setStatus("loading", `Video ${index}/${total}: saving to your computer…`, startTime);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // ── Status ────────────────────────────────────────────────
    let _statusTimer = null;

    function setStatus(type, msg, startTime) {
      const el = document.getElementById("status");
      el.className = type;
      if (_statusTimer) { clearInterval(_statusTimer); _statusTimer = null; }

      if (type === "loading") {
        // Build structure once — only update the timer span each tick
        // so the spinner CSS animation is never interrupted.
        el.innerHTML = `<div class="spinner"></div><span>${msg}&ensp;<span class="status-timer" style="color:var(--border2);font-size:11px">00:00</span></span>`;
        const timerEl = el.querySelector(".status-timer");
        const t0 = startTime || Date.now();
        const tick = () => {
          const secs = Math.floor((Date.now() - t0) / 1000);
          const mm = String(Math.floor(secs / 60)).padStart(2, "0");
          const ss = String(secs % 60).padStart(2, "0");
          timerEl.textContent = mm + ":" + ss;
        };
        tick();
        _statusTimer = setInterval(tick, 1000);
      } else {
        el.textContent = msg;
      }
    }
</script>
</body>
</html>
